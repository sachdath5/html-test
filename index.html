```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>White UI Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f7fa;
        font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
        background: #ffffff;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 320px;
    }

    .display {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 10px;
        background: #f1f3f6;
        text-align: right;
        font-size: 24px;
        padding: 10px;
        margin-bottom: 15px;
        outline: none;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        height: 55px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .btn-number {
        background: #ffffff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .btn-operator {
        background: #e3e8ff;
        color: #3b4cca;
    }

    .btn-equal {
        background: #4CAF50;
        color: white;
        grid-column: span 2;
    }

    .btn-clear {
        background: #ff6b6b;
        color: white;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="btn-clear" onclick="clearDisplay()">C</button>
        <button class="btn-operator" onclick="appendValue('/')">÷</button>
        <button class="btn-operator" onclick="appendValue('*')">×</button>
        <button class="btn-operator" onclick="appendValue('-')">−</button>

        <button class="btn-number" onclick="appendValue('7')">7</button>
        <button class="btn-number" onclick="appendValue('8')">8</button>
        <button class="btn-number" onclick="appendValue('9')">9</button>
        <button class="btn-operator" onclick="appendValue('+')">+</button>

        <button class="btn-number" onclick="appendValue('4')">4</button>
        <button class="btn-number" onclick="appendValue('5')">5</button>
        <button class="btn-number" onclick="appendValue('6')">6</button>
        <button class="btn-number" onclick="appendValue('.')">.</button>

        <button class="btn-number" onclick="appendValue('1')">1</button>
        <button class="btn-number" onclick="appendValue('2')">2</button>
        <button class="btn-number" onclick="appendValue('3')">3</button>
        <button class="btn-number" onclick="appendValue('0')">0</button>

        <button class="btn-equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        try {
            let result = eval(document.getElementById("display").value);
            document.getElementById("display").value = result;
        } catch {
            document.getElementById("display").value = "Error";
        }
    }

    // Keyboard support
    document.addEventListener("keydown", function(event) {
        const key = event.key;

        if (!isNaN(key) || "+-*/.".includes(key)) {
            appendValue(key);
        } else if (key === "Enter") {
            calculate();
        } else if (key === "Backspace") {
            let display = document.getElementById("display");
            display.value = display.value.slice(0, -1);
        } else if (key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
